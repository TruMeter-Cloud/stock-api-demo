<!DOCTYPE html>
<html>
<head>
  <title>Stock API Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      padding: 40px;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 4px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .stock-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .region {
      color: #6b7280;
      font-size: 14px;
    }

    .stock {
      font-size: 34px;
      font-weight: bold;
      margin-top: 8px;
    }

    pre {
      background: #111827;
      color: #d1d5db;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin-top: 24px;
    }

    .error {
      color: #dc2626;
      margin-top: 16px;
      font-weight: bold;
    }

    .success {
      color: #16a34a;
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Stock API Live Demo</h1>

  <p class="subtitle">
    Secure distributor stock lookup using API token authentication.
  </p>

  <label>Item ID</label>
  <input
    id="itemId"
    type="text"
    value="020973-01"
    placeholder="Enter item ID e.g. 020973-01"
  />

  <button id="checkButton" onclick="checkStock()">
    Check Stock
  </button>

  <div id="message"></div>

  <div id="stockResult" class="stock-grid" style="display:none;">

    <div class="stock-box">
      <div class="region">USA</div>
      <div id="usaStock" class="stock">0</div>
    </div>

    <div class="stock-box">
      <div class="region">UK</div>
      <div id="ukStock" class="stock">0</div>
    </div>

    <div class="stock-box">
      <div class="region">Malaysia</div>
      <div id="myStock" class="stock">0</div>
    </div>

  </div>

  <pre id="rawJson" style="display:none;"></pre>

</div>

<script>
  const API_BASE_URL = "https://stockapi-avhxcwhscfgvdgd3.z03.azurefd.net";

  const API_TOKEN = "stk_live_4a9ZTJ4GSZOXf3YMgk7aX7T_cvo8g2LM";

  function safeStockValue(value) {
    const numberValue = Number(value);

    if (Number.isNaN(numberValue) || numberValue < 0) {
      return 0;
    }

    return numberValue;
  }

  async function checkStock() {
    const itemId = document.getElementById("itemId").value.trim();

    const button = document.getElementById("checkButton");
    const message = document.getElementById("message");
    const stockResult = document.getElementById("stockResult");
    const rawJson = document.getElementById("rawJson");

    message.className = "";
    message.textContent = "";
    stockResult.style.display = "none";
    rawJson.style.display = "none";
    rawJson.textContent = "";

    if (!itemId) {
      message.className = "error";
      message.textContent = "Please enter an item ID.";
      return;
    }

    try {
      button.disabled = true;
      button.textContent = "Checking...";

      const response = await fetch(
        `${API_BASE_URL}/api/getStock?item=${encodeURIComponent(itemId)}`,
        {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${API_TOKEN}`
          }
        }
      );

      const text = await response.text();

      let data;

      try {
        data = JSON.parse(text);
      } catch {
        throw new Error("Response is not valid JSON: " + text);
      }

      rawJson.style.display = "block";
      rawJson.textContent = JSON.stringify(data, null, 2);

      if (!response.ok || data.success === false) {
        throw new Error(data?.error?.message || "API request failed.");
      }

      const result = data.data || {};
      const stock = result.stock || {};

      const usa = safeStockValue(stock.USA ?? stock.US ?? 0);
      const uk = safeStockValue(stock.UK ?? 0);
      const my = safeStockValue(stock.MY ?? stock.Malaysia ?? 0);

      document.getElementById("usaStock").textContent = usa;
      document.getElementById("ukStock").textContent = uk;
      document.getElementById("myStock").textContent = my;

      stockResult.style.display = "grid";

      message.className = "success";
      message.textContent = `Stock retrieved successfully for item ${result.item || itemId}.`;

    } catch (err) {
      message.className = "error";
      message.textContent = err.message;
    } finally {
      button.disabled = false;
      button.textContent = "Check Stock";
    }
  }
</script>

</body>
</html>
