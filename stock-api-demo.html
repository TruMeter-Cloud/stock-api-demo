<!DOCTYPE html>
<html>
<head>
  <title>Stock API Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      padding: 40px;
      color: #111827;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 4px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .stock-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .region {
      color: #6b7280;
      font-size: 14px;
    }

    .stock {
      font-size: 34px;
      font-weight: bold;
      margin-top: 8px;
    }

    pre {
      background: #111827;
      color: #d1d5db;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin-top: 24px;
    }

    .error {
      color: #dc2626;
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Stock API Live Demo</h1>

  <p class="subtitle">
    Secure distributor stock lookup using API token authentication.
  </p>

  <label>Item ID</label>
  <input
    id="itemId"
    type="text"
    placeholder="Enter item ID e.g. FM-1001"
  />

  <button onclick="checkStock()">
    Check Stock
  </button>

  <div id="error" class="error"></div>

  <div id="stockResult" class="stock-grid" style="display:none;">

    <div class="stock-box">
      <div class="region">USA</div>
      <div id="usaStock" class="stock">0</div>
    </div>

    <div class="stock-box">
      <div class="region">UK</div>
      <div id="ukStock" class="stock">0</div>
    </div>

    <div class="stock-box">
      <div class="region">Malaysia</div>
      <div id="myStock" class="stock">0</div>
    </div>

  </div>

  <pre id="rawJson" style="display:none;"></pre>

</div>

<script>

  // ============================
  // CONFIG
  // ============================

  const API_BASE_URL = "https://stockapi-avhxcwhscfgvdgd3.z03.azurefd.net";

  const API_TOKEN = "stk_live_4a9ZTJ4GSZOXf3YMgk7aX7T_cvo8g2LM";
 
  // ============================
  // MAIN FUNCTION
  // ============================

  async function checkStock() {

    const itemId = document
      .getElementById("itemId")
      .value
      .trim();

    const errorBox = document.getElementById("error");
    const stockResult = document.getElementById("stockResult");
    const rawJson = document.getElementById("rawJson");

    errorBox.textContent = "";
    stockResult.style.display = "none";
    rawJson.style.display = "none";

    if (!itemId) {
      errorBox.textContent = "Please enter an item ID.";
      return;
    }

    try {

      const response = await fetch(
        `${API_BASE_URL}/api/getStock?item=${encodeURIComponent(itemId)}`,
        {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${API_TOKEN}`,
            "Content-Type": "application/json"
          }
        }
      );

      const data = await response.json();

      if (!response.ok || data.success === false) {
        throw new Error(
          data?.error?.message || "API request failed."
        );
      }

      const stock = data.stock || {};

      document.getElementById("usaStock").textContent =
        Math.max(0, stock.US ?? stock.USA ?? 0);

      document.getElementById("ukStock").textContent =
        Math.max(0, stock.UK ?? 0);

      document.getElementById("myStock").textContent =
        Math.max(0, stock.MY ?? stock.Malaysia ?? 0);

      stockResult.style.display = "grid";

      rawJson.style.display = "block";

      rawJson.textContent =
        JSON.stringify(data, null, 2);

    }

    catch (err) {

      errorBox.textContent = err.message;

    }

  }

</script>

</body>
</html>
